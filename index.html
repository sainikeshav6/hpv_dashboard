<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>HPV Alignment Dashboard</title>
<style>
:root{--bg:#f5f7fb;--panel:#fff;--ink:#1f2733;--muted:#6b7686;--line:#e6eaf0;--accent:#2563eb;--shadow:0 6px 24px rgba(20,40,80,.08)}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
.app{max-width:1320px;margin:0 auto;padding:22px}
header h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.3px}
header p{margin:4px 0 0;color:var(--muted);font-size:13px}
.viewtabs{display:flex;gap:8px;margin-top:16px}
.viewtabs button{border:1px solid var(--line);background:#fff;padding:10px 16px;border-radius:11px;cursor:pointer;font-size:13.5px;font-weight:700;color:var(--muted);transition:.15s}
.viewtabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.layout{display:grid;grid-template-columns:268px 1fr;gap:20px;margin-top:16px;align-items:start}
@media(max-width:880px){.layout{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
.side{padding:16px}
.side h3{margin:2px 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.seg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.seg button{flex:1 0 auto;border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 9px;border-radius:9px;cursor:pointer;font-size:12.5px;font-weight:600;transition:.15s}
.seg button:hover{border-color:#c9d3e0}
.seg button.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.presets{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.presets button{flex:1 0 28%;font-size:11px;padding:6px 4px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;color:var(--muted);font-weight:600}
.presets button:hover{color:var(--ink);border-color:#c9d3e0}
.chips{display:flex;flex-wrap:wrap;gap:6px;max-height:360px;overflow:auto;padding:2px}
.chip{font-size:12px;padding:5px 9px;border-radius:20px;border:1px solid var(--line);background:#fff;cursor:pointer;user-select:none;transition:.12s;font-weight:600;color:var(--muted)}
.chip.on{background:#e8f0fe;border-color:#bcd3fb;color:#1d4ed8}
.chip.hr{box-shadow:inset 0 0 0 1px #f3c9c0}
.chip.ph{box-shadow:inset 0 0 0 1px #f0cd8a}
.main{padding:16px 18px 20px}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.toolbar .meta{color:var(--muted);font-size:12.5px}
.legend{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted)}
.bar{width:160px;height:12px;border-radius:6px}
.hmwrap{overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fbfcfe}
#heat{display:grid;gap:2px;padding:10px}
.tile{width:100%;height:100%;border-radius:4px;cursor:pointer;transition:transform .08s,box-shadow .08s}
.tile:hover{transform:scale(1.18);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--accent);z-index:5}
.tile.diag{outline:1px dashed rgba(0,0,0,.18);outline-offset:-2px;cursor:default}
.tile.diag:hover{transform:none;box-shadow:none}
.lbl{font-size:10.5px;color:var(--muted);display:flex;align-items:center;justify-content:center;font-weight:600;overflow:hidden;white-space:nowrap}
.lbl.col{writing-mode:vertical-rl;transform:rotate(180deg)}
.lbl.row{justify-content:flex-end;padding-right:6px}
.corner{font-size:10px;color:#aeb6c2;display:flex;align-items:flex-end;justify-content:flex-end;padding:3px}
#tooltip{position:fixed;pointer-events:none;background:#1f2733;color:#fff;padding:7px 10px;border-radius:8px;font-size:12px;opacity:0;transition:opacity .12s;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.25);white-space:nowrap}
#tooltip b{color:#9fc2ff}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:40;padding:20px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:920px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.mhead{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;z-index:2}
.mhead h2{margin:0;font-size:18px}
.mhead .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
.close{border:none;background:#f1f4f9;width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:18px;color:var(--muted)}
.close:hover{background:#e7ecf4}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px}
.stat{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.stat .v{font-size:20px;font-weight:700;margin-top:3px}
.alnbox{padding:6px 20px 22px}.alnbox h4{margin:8px 0 8px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.aln{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.45;white-space:pre;background:#0f172a;color:#cbd5e1;border-radius:10px;padding:12px 14px;overflow:auto}
.aln .blk{margin-bottom:12px}.aln .coord{color:#64748b}.aln .id{color:#4ade80;font-weight:700}.aln .sim{color:#fbbf24}.aln .mis{color:#f87171}.aln .gap{color:#475569}.aln .mid{color:#64748b}
.note{padding:0 20px 18px;color:var(--muted);font-size:12px}
.foot{color:#aeb6c2;font-size:11.5px;text-align:center;margin-top:16px}
.dlbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.dlbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--accent2);font-weight:600;font-size:12px;padding:7px 11px;border-radius:9px;cursor:pointer;transition:.15s}
.dlbtn:hover{border-color:var(--accent);background:#f0f6ff}
.dlbtn svg{width:13px;height:13px}
#treewrap{overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fbfcfe;padding:6px}
#treewrap svg{display:block}
.leaf-lbl{font-family:-apple-system,"Segoe UI",sans-serif;font-size:11.5px;cursor:pointer}
.leaf-lbl:hover{font-weight:700}
.branch{stroke:#94a3b8;stroke-width:1.4;fill:none;transition:stroke .1s}
.branch.hot{stroke:#2563eb;stroke-width:2.4}
.tipdot{cursor:pointer}
.scalebar{stroke:#1f2733;stroke-width:1.4}
.treectl{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.treectl label{font-size:12.5px;color:var(--muted);display:flex;gap:5px;align-items:center;cursor:pointer}
.contact{margin-top:20px;padding:16px 18px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:1px;align-items:center;text-align:center}
.contact .cline{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:#aeb6c2;font-weight:700;margin-bottom:3px}
.contact .cname{font-size:14px;font-weight:700;color:var(--ink)}
.contact .corg{font-size:12.5px;color:var(--muted)}
#gate{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,#16213A,#21314f);display:flex;align-items:center;justify-content:center;padding:20px}
.gatebox{background:#fff;border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.4);padding:34px 32px;width:360px;max-width:100%;text-align:center}
.glogo{margin-bottom:8px;line-height:0}.glogo svg{filter:drop-shadow(0 4px 10px rgba(37,71,168,.35))}
.gtitle{font-size:18px;font-weight:700;color:var(--ink)}
.gsub{font-size:12.5px;color:var(--muted);margin:6px 0 18px}
#gpw{width:100%;box-sizing:border-box;padding:11px 13px;font-size:14px;border:1px solid var(--line);border-radius:10px;outline:none;transition:.15s}
#gpw:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
#gbtn{width:100%;margin-top:12px;padding:11px;font-size:14px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:10px;cursor:pointer;transition:.15s}
#gbtn:hover{background:#1d4ed8}
#gerr{min-height:18px;margin-top:10px;font-size:12.5px;color:#dc2626;font-weight:600}
.gfoot{margin-top:16px;font-size:11px;color:#aeb6c2}
</style>
</head>

  (function w(n){if(!n.children.length){const t=(n.name||'').split('-')[0];if(!out.includes(t))out.push(t);}else n.children.forEach(w);})(r);return out;}

const TYPE_RANK={};TYPE_ORDER.forEach((t,i)=>TYPE_RANK[t]=i);
function typeRank(t){return (t in TYPE_RANK)?TYPE_RANK[t]:999;}
function typeCatClass(t){return (DATA.highRisk||[]).includes(t)?" hr":((DATA.possibleHigh||[]).includes(t)?" ph":"");}
function typeCatTitle(t){return (DATA.highRisk||[]).includes(t)?" (high-risk)":((DATA.possibleHigh||[]).includes(t)?" (possible high-risk)":" (low-risk)");}
function colorFor(v,lo,hi){let t=(v-lo)/(hi-lo);t=Math.max(0,Math.min(1,t));let r,g,b;
  if(t<0.5){r=248;g=Math.round(105+(216-105)*(t/0.5));b=96;}
  else{r=Math.round(248-(248-99)*((t-0.5)/0.5));g=Math.round(216-(216-190)*((t-0.5)/0.5));b=Math.round(96+(123-96)*((t-0.5)/0.5));}
  return `rgb(${r},${g},${b})`;}
function evalScale(E){return E<=0?320:Math.min(320,-Math.log10(E));}

/* ---------- BETWEEN (per-protein, types×types) ---------- */
function compute(s1,s2,len1,len2){let ident=0,sim=0,aln=0,raw=0,inGap=false;
  for(let i=0;i<s1.length;i++){const c1=s1[i],c2=s2[i];const g1=c1==="-",g2=c2==="-";
    if(g1&&g2){inGap=false;continue;} if(g1||g2){raw-=inGap?GE:GO;inGap=true;continue;}
    inGap=false;aln++;const s=sc(c1,c2);raw+=s;if(c1===c2)ident++;if(s>0)sim++;}
  const pid=aln?100*ident/aln:0,psim=aln?100*sim/aln:0;
  const bit=(LAM*raw-Math.log(KK))/Math.LN2;const E=KK*len1*len2*Math.exp(-LAM*raw);
  return {ident,sim,aln,raw,pid,psim,bit,E};}
function getPairB(n1,n2){const k=gene+"|"+n1.id+"|"+n2.id,k2=gene+"|"+n2.id+"|"+n1.id;
  if(cache[k])return cache[k];if(cache[k2])return cache[k2];
  const r=compute(n1.seq,n2.seq,n1.seq.replace(/-/g,"").length,n2.seq.replace(/-/g,"").length);cache[k]=r;return r;}
function mvalB(r){if(metric==="pid")return r.pid;if(metric==="psim")return r.psim;if(metric==="bit")return r.bit;return evalScale(r.E);}

/* ---------- WITHIN (per-type, protein×protein) ---------- */
function getPairW(t,gi,gj){const d=WDATA.data[t];let p=d.pairs[gi+"~"+gj],flip=false;
  if(!p){p=d.pairs[gj+"~"+gi];flip=true;} if(!p)return null;
  return flip?{...p,a1:p.a2,a2:p.a1,st1:p.st2,st2:p.st1,len1:p.len2,len2:p.len1}:p;}
function mvalW(p){if(metric==="pid")return p.pid;if(metric==="psim")return p.psim;if(metric==="bit")return p.bit;return evalScale(p.E);}

/* ---------- sidebar ---------- */
function segBtns(items,active,cb,labeler){const wrap=document.createElement("div");wrap.className="seg";

    b.onclick=()=>cb(it);wrap.appendChild(b);});return wrap;}
function buildSide(){const s=document.getElementById("side");s.innerHTML="";
  // metric (shared)

    addH("Protein");s.appendChild(segBtns(DATA.betweenGenes||DATA.geneOrder,gene,g=>{gene=g;buildSide();render();}));
    addH("Metric");s.appendChild(metricSeg());
    addH("HPV types");
    const pr=document.createElement("div");pr.className="presets";
    [["all","All"],["none","None"],["hr","High-risk"],["ph","Poss. high"],["low","Low-risk"]].forEach(([p,lab])=>{const b=document.createElement("button");b.textContent=lab;
      b.onclick=()=>{if(p==="all")selectedTypes=new Set(DATA.allTypes);else if(p==="none")selectedTypes=new Set();
        else if(p==="hr")selectedTypes=new Set(DATA.highRisk);
        else if(p==="ph")selectedTypes=new Set(DATA.possibleHigh);

    s.appendChild(pr);
    const c=document.createElement("div");c.className="chips";

      ch.textContent=t.replace("HPV","");ch.title=t+typeCatTitle(t);

    s.appendChild(c);
    const h=document.createElement("h3");h.textContent="Metric";h.style.marginTop="16px";s.appendChild(h);
    s.appendChild(metricSeg());

    const pr=document.createElement("div");pr.className="presets";
    [["all","All"],["none","None"]].forEach(([p,lab])=>{const b=document.createElement("button");b.textContent=lab;

function metricSeg(){const ms=document.createElement("div");ms.className="seg";

    b.onclick=()=>{metric=m;[...ms.children].forEach(c=>c.classList.toggle("on",c.textContent===metrics[m].label));render();};ms.appendChild(b);});

/* ---------- phylogenetic trees ---------- */
function parseNewick(s){
  s=s.replace(/^﻿/,"").trim();
  if(s.endsWith(";"))s=s.slice(0,-1);
  let pos=0;
  function node(){const n={children:[]};
    if(s[pos]==="("){ pos++;
      while(true){ n.children.push(node());
        if(s[pos]===","){pos++;continue;}
        if(s[pos]===")"){pos++;break;}
        break; } }
    let name="";
    while(pos<s.length && !"():,;".includes(s[pos])){name+=s[pos++];}
    n.name=name||null;
    if(s[pos]===":"){ pos++; let num="";
      while(pos<s.length && !"():,;".includes(s[pos])){num+=s[pos++];}
      n.length=parseFloat(num); }
    else n.length=0;
    return n; }
  return node();
}
function layoutTree(root,mode){
  const leaves=[]; let maxDepthLen=0;
  (function maxd(n,acc){const d=acc+(n.length||0); if(!n.children.length){maxDepthLen=Math.max(maxDepthLen,d);return;} n.children.forEach(c=>maxd(c,d));})(root,0);
  let li=0;
  (function setY(n){ if(!n.children.length){n.y=li++; n.leaf=true; return;}
    n.children.forEach(setY); n.y=n.children.reduce((a,c)=>a+c.y,0)/n.children.length; })(root);
  // x by cumulative branch length (phylo) or by depth (clado)
  let maxDepth=0;
  (function depth(n,d){n.depth=d; maxDepth=Math.max(maxDepth,d); n.children.forEach(c=>depth(c,d+1));})(root,0);
  (function setX(n,acc){ const xlen=acc+(n.length||0); n.xlen=xlen; n.children.forEach(c=>setX(c,xlen)); })(root,0);
  return {leaves:li,maxDepthLen,maxDepth};
}
function pruneTree(n,keep){
  if(!n.children.length){return keep.has((n.name||'').split('-')[0])?n:null;}
  const kids=n.children.map(c=>pruneTree(c,keep)).filter(Boolean);
  if(kids.length===0)return null;
  if(kids.length===1){const c=kids[0];c.length=(c.length||0)+(n.length||0);return c;}
  n.children=kids;return n;
}
function tidyLabel(name){const g=treeKey.split(' ')[0];return (name||'').replace('-'+g,'').replace(/-E5_[A-Z]+$/,'');}
function renderTrees(){
  ensureTreeSel();

  document.getElementById("meta").innerHTML=`Distance tree · <b>${treeKey}</b> · ${layoutName} · branch lengths = alignment distance`;
  document.getElementById("foot").textContent="Branch lengths reflect evolutionary distance from the alignment. High-risk types in red. Use the HPV types panel to add or remove tips.";
  let root=parseNewick(TREEDATA.trees[treeKey]);
  root=pruneTree(root,treeSelTypes);
  const wrap=document.getElementById("treewrap");
  let nLeaves=0; if(root)(function cnt(n){if(!n.children.length)nLeaves++;else n.children.forEach(cnt);})(root);
  if(!root||nLeaves<2){wrap.innerHTML='<div style="padding:46px;color:#9aa3b2;text-align:center">Select at least 2 HPV types to draw a tree.</div>';return;}
  layoutTree(root,treeMode);
  // recompute max cumulative length over kept tree
  let maxLen=0,maxDepth=0;
  (function w(n){maxLen=Math.max(maxLen,n.xlen);maxDepth=Math.max(maxDepth,n.depth);n.children.forEach(w);})(root);
  // reassign leaf y indices densely
  let li=0;(function sy(n){if(!n.children.length){n.y=li++;n.leaf=true;}else{n.children.forEach(sy);n.y=n.children.reduce((a,c)=>a+c.y,0)/n.children.length;}})(root);
  const N=li;
  if(treeMode==="radial"){wrap.innerHTML=radialSVG(root,N,maxLen,maxDepth);return;}
  // rectangular
  const rowH=Math.max(15,Math.min(26,Math.floor(620/N)));
  const H=N*rowH+44, padL=14, padR=176, W=760, plotW=W-padL-padR;
  const xOf=n=> treeMode==="phylo" ? padL+(maxLen?plotW*(n.xlen/maxLen):0) : padL+(maxDepth?plotW*(n.depth/maxDepth):0);
  const yOf=n=> 24+n.y*rowH+rowH/2;
  let paths="",labels="",dots="";
  (function draw(n){
    n.children.forEach(c=>{paths+=`<path class="branch" d="M${xOf(n)} ${yOf(n)} V${yOf(c)} H${xOf(c)}"/>`;draw(c);});
    if(n.leaf){const x=xOf(n),y=yOf(n);const typ=(n.name||"").split("-")[0];const hr=DATA.highRisk.includes(typ);
      dots+=`<circle cx="${x}" cy="${y}" r="3" fill="${hr?'#dc2626':'#475569'}"><title>${n.name}</title></circle>`;
      labels+=`<text class="leaf-lbl" x="${x+7}" y="${y+3.5}" fill="${hr?'#dc2626':'#1f2733'}">${tidyLabel(n.name)}</text>`;}
  })(root);
  let scale="";
  if(treeMode==="phylo"&&maxLen){const unit=niceUnit(maxLen/4);const px=plotW*(unit/maxLen);const sy=H-12,sx=padL;
    scale=`<line class="scalebar" x1="${sx}" y1="${sy}" x2="${sx+px}" y2="${sy}"/><line class="scalebar" x1="${sx}" y1="${sy-4}" x2="${sx}" y2="${sy+4}"/><line class="scalebar" x1="${sx+px}" y1="${sy-4}" x2="${sx+px}" y2="${sy+4}"/><text x="${sx+px/2}" y="${sy-7}" text-anchor="middle" font-size="11" fill="#64748b">${unit} distance units</text>`;}
  wrap.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="min-width:${W}px">${paths}${scale}${dots}${labels}</svg>`;
}
function radialSVG(root,N,maxLen,maxDepth){
  const size=Math.max(520,Math.min(820,N*22+260));const cx=size/2,cy=size/2;
  const R=size/2-120;
  const useLen=(treeMode==="radial");// radial uses cumulative length
  const denom=maxLen||1;
  const aOf=n=> (n.y/(N))*2*Math.PI - Math.PI/2;
  const rOf=n=> R*(n.xlen/denom);
  const P=(r,a)=>[cx+r*Math.cos(a),cy+r*Math.sin(a)];
  let paths="",labels="",dots="";
  (function draw(n){
    if(n.children.length){
      // arc connecting children at radius rOf(n)
      const as=n.children.map(c=>aOf(c));const a0=Math.min(...as),a1=Math.max(...as);const rr=rOf(n);
      const [sx,sy]=P(rr,a0),[ex,ey]=P(rr,a1);const large=(a1-a0)>Math.PI?1:0;
      paths+=`<path class="branch" d="M${sx.toFixed(1)} ${sy.toFixed(1)} A${rr.toFixed(1)} ${rr.toFixed(1)} 0 ${large} 1 ${ex.toFixed(1)} ${ey.toFixed(1)}"/>`;
      n.children.forEach(c=>{const a=aOf(c);const [x1,y1]=P(rOf(n),a),[x2,y2]=P(rOf(c),a);
        paths+=`<path class="branch" d="M${x1.toFixed(1)} ${y1.toFixed(1)} L${x2.toFixed(1)} ${y2.toFixed(1)}"/>`;draw(c);});
    }
    if(!n.children.length){const a=aOf(n),[x,y]=P(rOf(n),a);const typ=(n.name||"").split("-")[0];const hr=DATA.highRisk.includes(typ);
      const deg=a*180/Math.PI;const flip=(deg>90||deg<-90);const [lx,ly]=P(rOf(n)+6,a);
      dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.8" fill="${hr?'#dc2626':'#475569'}"><title>${n.name}</title></circle>`;
      labels+=`<text class="leaf-lbl" x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" fill="${hr?'#dc2626':'#1f2733'}" text-anchor="${flip?'end':'start'}" transform="rotate(${(flip?deg+180:deg).toFixed(1)} ${lx.toFixed(1)} ${ly.toFixed(1)})" dominant-baseline="middle">${tidyLabel(n.name)}</text>`;}
  })(root);
  let scale="";
  if(maxLen){const unit=niceUnit(maxLen/4);const px=R*(unit/maxLen);
    scale=`<line class="scalebar" x1="14" y1="${size-14}" x2="${14+px}" y2="${size-14}"/><text x="${14+px/2}" y="${size-20}" text-anchor="middle" font-size="11" fill="#64748b">${unit} units</text>`;}
  return `<svg viewBox="0 0 ${size} ${size}" width="100%" style="min-width:${Math.min(size,520)}px">${paths}${dots}${labels}${scale}</svg>`;
}
function niceUnit(x){const p=Math.pow(10,Math.floor(Math.log10(x)));const f=x/p; const n=f<1.5?1:f<3?2:f<7?5:10; return n*p;}

function alnBlocks(labA,labB,s1,s2,start1,start2){const W=60;let out="";let p1=start1-1,p2=start2-1;
  for(let off=0;off<s1.length;off+=W){const e=Math.min(s1.length,off+W);let l1="",mid="",l2="";const st1=p1+1,st2=p2+1;
    for(let i=off;i<e;i++){const c1=s1[i],c2=s2[i];if(c1!=="-")p1++;if(c2!=="-")p2++;
      let cls1="gap",cls2="gap",mc=" ";
      if(c1!=="-"&&c2!=="-"){if(c1===c2){cls1=cls2="id";mc="|";}else if(sc(c1,c2)>0){cls1=cls2="sim";mc=":";}else{cls1=cls2="mis";mc=".";}}
      l1+=`<span class="${cls1}">${c1}</span>`;l2+=`<span class="${cls2}">${c2}</span>`;mid+=`<span class="mid">${mc}</span>`;}
    const pad=s=>String(s).padStart(5," ");const nm=s=>s.padEnd(10).slice(0,10);
    out+=`<div class="blk"><span class="coord">${nm(labA)} ${pad(st1)} </span>${l1} <span class="coord">${pad(p1)}</span>\n`;
    out+=`<span class="coord">${" ".repeat(17)}</span>${mid}\n`;
    out+=`<span class="coord">${nm(labB)} ${pad(st2)} </span>${l2} <span class="coord">${pad(p2)}</span></div>`;}

    sd+=`<row r="${ri+1}">${cells}</row>`;});
  const sheet=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>${sd}</sheetData></worksheet>`;
  const ct=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>`;
  const rels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`;
  const wb=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="${xesc(sheetName).slice(0,31)}" sheetId="1" r:id="rId1"/></sheets></workbook>`;
  const wbr=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>`;
  const bytes=zipStore([{name:"[Content_Types].xml",data:ct},{name:"_rels/.rels",data:rels},{name:"xl/workbook.xml",data:wb},{name:"xl/_rels/workbook.xml.rels",data:wbr},{name:"xl/worksheets/sheet1.xml",data:sheet}]);
  dlBlob(filename,bytes,"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
}
function summaryRows(sp){
  const rows=[];
  if(sp.kind==="between"){
    const items=sp.items;const ref=items.find(i=>i.type==="HPV16")||items[0];
    rows.push(["HPV Alignment Summary"]);
    rows.push(["Protein",sp.label]);rows.push(["Sequences",items.length]);
    rows.push(["Alignment length (columns)",sp.alnLen]);
    rows.push(["Reference for % identity",ref?ref.id:""]);
    // mean pairwise id
    let tot=0,cnt=0;for(let i=0;i<items.length;i++)for(let j=i+1;j<items.length;j++){tot+=compute(items[i].gapped,items[j].gapped,0,0).pid;cnt++;}
    rows.push(["Mean pairwise % identity",cnt?Math.round(tot/cnt*10)/10:""]);
    rows.push([]);
    rows.push(["Sequence","Ungapped length","% gaps","% identity vs "+(ref?ref.label:"")]);
    items.forEach(it=>{const g=100*(it.gapped.length-it.ungapped.length)/it.gapped.length;
      const pid=ref?compute(it.gapped,ref.gapped,0,0).pid:100;
      rows.push([it.id,it.ungapped.length,Math.round(g*10)/10,Math.round(pid*10)/10]);});
    rows.push([]);
    rows.push(["Pairwise % identity matrix"]);
    rows.push([""].concat(items.map(i=>i.label)));
    items.forEach(a=>{rows.push([a.label].concat(items.map(b=>a===b?100:Math.round(compute(a.gapped,b.gapped,0,0).pid*10)/10)));});
  } else {
    const items=sp.items;
    rows.push(["Within-type Protein Summary"]);
    rows.push(["HPV type",sp.label]);rows.push(["Proteins",items.length]);rows.push([]);
    rows.push(["Protein","Length (aa)"]);
    items.forEach(it=>rows.push([it.label,it.ungapped.length]));
    rows.push([]);
    rows.push(["Pairwise % identity matrix (local alignment)"]);
    rows.push([""].concat(items.map(i=>i.label)));
    items.forEach(a=>{rows.push([a.label].concat(items.map(b=>{if(a===b)return 100;const p=getPairW(sp.label,a.label,b.label);return p?p.pid:"";})));});
  }
  return rows;
}
function btn(label,cb){const b=document.createElement("button");b.className="dlbtn";
  b.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg>`+label;
  b.onclick=cb;return b;}
function updateDownloads(){
  const bar=document.getElementById("dlbar");bar.innerHTML="";
  if(view==="trees"){
    bar.appendChild(btn("Tree (Newick)",()=>dlBlob(`HPV_${treeKey.replace(/[^A-Za-z0-9]/g,'_')}_tree.nwk`,TREEDATA.trees[treeKey],"text/plain")));
    return;
  }
  const sp=scope();if(!sp.items||!sp.items.length)return;
  const tag=sp.label.replace(/[^A-Za-z0-9]/g,'');
  bar.appendChild(btn("Reference FASTA",()=>dlBlob(`HPV_${tag}_reference.fasta`,toFasta(sp.items,false),"text/plain")));
  if(sp.kind==="between")
    bar.appendChild(btn("MAFFT alignment",()=>dlBlob(`HPV_${tag}_MAFFT_alignment.fasta`,toFasta(sp.items,true),"text/plain")));
  bar.appendChild(btn("Summary (Excel)",()=>xlsx(`HPV_${tag}_alignment_summary.xlsx`,(sp.kind==="between"?sp.label:sp.label)+" summary",summaryRows(sp))));
}

document.querySelectorAll("#viewTabs button").forEach(b=>b.onclick=()=>{view=b.dataset.v;
  document.querySelectorAll("#viewTabs button").forEach(x=>x.classList.toggle("on",x.dataset.v===view));
  buildSide();render();});

buildSide();render();

</script>
